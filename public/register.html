<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PokéBot — Registrazione</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #020409;
  --cyan: #00d4ff;
  --violet: #7c3aed;
  --purple: #a855f7;
  --text: #f0f4ff;
  --text-dim: rgba(240,244,255,0.5);
  --text-dimmer: rgba(240,244,255,0.22);
  --red: #f43f5e;
  --green: #10b981;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg);
  font-family: 'Inter', system-ui, sans-serif;
  color: var(--text);
  padding: 1.5rem;
  overflow-x: hidden;
  position: relative;
}

/* ── BACKGROUND ── */
.bg-grid {
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(124,58,237,0.055) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,212,255,0.055) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
  z-index: 0;
}
.orb {
  position: fixed;
  border-radius: 50%;
  filter: blur(100px);
  pointer-events: none;
  z-index: 0;
  animation: orbFloat linear infinite;
}
.orb-1 {
  width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(168,85,247,0.2), transparent 70%);
  top: -150px; right: -150px;
  animation-duration: 28s;
}
.orb-2 {
  width: 550px; height: 550px;
  background: radial-gradient(circle, rgba(0,212,255,0.14), transparent 70%);
  bottom: -100px; left: -100px;
  animation-duration: 34s;
  animation-direction: reverse;
}
@keyframes orbFloat {
  0%   { transform: translate(0, 0) scale(1); }
  25%  { transform: translate(30px,-20px) scale(1.04); }
  50%  { transform: translate(-15px, 35px) scale(0.96); }
  75%  { transform: translate(22px, 15px) scale(1.02); }
  100% { transform: translate(0, 0) scale(1); }
}
.scanline {
  position: fixed;
  top: -2px; left: 0;
  width: 100%; height: 2px;
  background: linear-gradient(90deg, transparent, rgba(168,85,247,0.4), transparent);
  animation: scanDown 7s linear infinite;
  pointer-events: none;
  z-index: 1;
}
@keyframes scanDown {
  0%   { top: -2px; opacity: 1; }
  90%  { opacity: 0.4; }
  100% { top: 100vh; opacity: 0; }
}

/* ── ANIMATED BORDER CARD ── */
.card-outer {
  position: relative;
  border-radius: 26px;
  padding: 1px;
  overflow: hidden;
  z-index: 2;
  width: 100%;
  max-width: 460px;
  box-shadow: 0 40px 120px rgba(0,0,0,0.75), 0 0 80px rgba(168,85,247,0.07);
}
.card-glow {
  position: absolute;
  inset: -200%;
  background: conic-gradient(
    from 0deg,
    transparent 55%,
    rgba(168,85,247,0.85) 65%,
    rgba(0,212,255,0.65) 78%,
    transparent 90%
  );
  animation: rotateBorder 5s linear infinite;
  z-index: 0;
}
@keyframes rotateBorder {
  to { transform: rotate(360deg); }
}
.card {
  position: relative;
  z-index: 1;
  background: rgba(4, 8, 22, 0.97);
  backdrop-filter: blur(40px);
  -webkit-backdrop-filter: blur(40px);
  border-radius: 25px;
  padding: 2.25rem 2.25rem 1.75rem;
}

/* ── BRAND ── */
.brand {
  text-align: center;
  margin-bottom: 1.75rem;
}
.brand-icon {
  font-size: 2.5rem;
  display: inline-block;
  margin-bottom: 0.75rem;
  filter: drop-shadow(0 0 18px rgba(168,85,247,0.8)) drop-shadow(0 0 38px rgba(0,212,255,0.35));
  animation: iconPulse 3s ease-in-out infinite;
}
@keyframes iconPulse {
  0%,100% { filter: drop-shadow(0 0 14px rgba(168,85,247,0.65)) drop-shadow(0 0 28px rgba(0,212,255,0.3)); }
  50%      { filter: drop-shadow(0 0 26px rgba(168,85,247,1))   drop-shadow(0 0 50px rgba(0,212,255,0.6)); }
}
.brand h1 {
  font-family: 'Syne', sans-serif;
  font-size: 1.6rem;
  font-weight: 800;
  letter-spacing: -0.03em;
  background: linear-gradient(135deg, #fff 20%, var(--purple) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 0.3rem;
}
.brand-sub {
  font-size: 0.68rem;
  color: var(--text-dimmer);
  letter-spacing: 0.2em;
  text-transform: uppercase;
  font-weight: 500;
}

/* ── FIELDS ── */
.row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
.field-group { margin-bottom: 0.95rem; }
.field-label {
  display: block;
  font-size: 0.67rem;
  font-weight: 600;
  color: var(--text-dim);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 0.45rem;
}
.field-group input {
  width: 100%;
  padding: 0.8rem 1rem;
  background: rgba(0,0,0,0.45);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 12px;
  color: var(--text);
  font-size: 0.92rem;
  font-family: 'Inter', sans-serif;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.field-group input::placeholder { color: var(--text-dimmer); }
.field-group input:focus {
  outline: none;
  border-color: rgba(168,85,247,0.5);
  box-shadow: 0 0 0 3px rgba(168,85,247,0.07);
}
.field-group input.err-input { border-color: rgba(244,63,94,0.45); }
.pw-wrap { position: relative; }
.pw-wrap input { padding-right: 3rem; }
.pw-toggle {
  position: absolute;
  right: 0.8rem; top: 50%;
  transform: translateY(-50%);
  background: none; border: none;
  color: var(--text-dimmer);
  cursor: pointer;
  padding: 0.25rem;
  font-size: 1rem;
  line-height: 1;
  transition: color 0.15s;
}
.pw-toggle:hover { color: var(--text-dim); }

/* Strength bar */
.strength {
  height: 3px;
  border-radius: 2px;
  margin-top: 0.5rem;
  background: rgba(255,255,255,0.05);
  overflow: hidden;
}
.strength-bar {
  height: 100%;
  border-radius: 2px;
  width: 0;
  transition: width 0.3s, background 0.3s;
}

/* ── BUTTON ── */
.btn-register {
  width: 100%;
  padding: 0.88rem;
  background: linear-gradient(135deg, #4c1d95 0%, var(--violet) 55%, var(--purple) 100%);
  color: #fff;
  border: none;
  border-radius: 12px;
  font-family: 'Syne', sans-serif;
  font-size: 0.95rem;
  font-weight: 700;
  letter-spacing: 0.06em;
  cursor: pointer;
  box-shadow: 0 4px 30px rgba(124,58,237,0.5);
  transition: box-shadow 0.2s, transform 0.15s, opacity 0.15s;
  position: relative;
  overflow: hidden;
  margin-top: 0.25rem;
}
.btn-register::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, transparent 55%);
  pointer-events: none;
}
.btn-register .shimmer {
  position: absolute;
  top: 0; left: -60%;
  width: 40%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
  transform: skewX(-15deg);
  animation: shimmer 3.5s ease-in-out infinite;
  pointer-events: none;
}
@keyframes shimmer {
  0%   { left: -60%; }
  60%  { left: 130%; }
  100% { left: 130%; }
}
.btn-register:hover:not(:disabled) {
  box-shadow: 0 8px 45px rgba(124,58,237,0.7), 0 0 30px rgba(168,85,247,0.2);
  transform: translateY(-1px);
}
.btn-register:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

/* ── ALERTS ── */
@keyframes shake {
  0%,100% { transform: translateX(0); }
  20%,60% { transform: translateX(-5px); }
  40%,80% { transform: translateX(5px); }
}
.alert {
  display: none;
  align-items: center;
  gap: 0.6rem;
  padding: 0.7rem 1rem;
  border-radius: 10px;
  margin-bottom: 0.95rem;
  font-size: 0.83rem;
  font-weight: 500;
  line-height: 1.4;
}
.alert.err { background: rgba(244,63,94,0.07); border: 1px solid rgba(244,63,94,0.25); color: #fb7185; }
.alert.ok  { background: rgba(16,185,129,0.07); border: 1px solid rgba(16,185,129,0.25); color: #34d399; }
.alert.show { display: flex; }
.alert.shake { animation: shake 0.4s ease; }

/* ── FOOTER ── */
.divider {
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.07), transparent);
  margin: 1.25rem 0 1.1rem;
}
.footer-link {
  text-align: center;
  font-size: 0.78rem;
  color: var(--text-dimmer);
}
.footer-link a {
  color: var(--cyan);
  text-decoration: none;
  font-weight: 600;
  transition: opacity 0.15s;
}
.footer-link a:hover { opacity: 0.75; }
.terms {
  font-size: 0.69rem;
  color: var(--text-dimmer);
  text-align: center;
  margin-top: 0.85rem;
  line-height: 1.55;
}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="scanline"></div>

<div class="card-outer">
  <div class="card-glow"></div>
  <div class="card">
    <div class="brand">
      <div class="brand-icon">✨</div>
      <h1>Crea account</h1>
      <p class="brand-sub">PokéBot Panel v3.0</p>
    </div>

    <div class="alert err" id="alertErr">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
      <span id="errMsg"></span>
    </div>

    <div class="row">
      <div class="field-group">
        <label class="field-label" for="firstName">Nome</label>
        <input type="text" id="firstName" placeholder="Mario" autocomplete="given-name">
      </div>
      <div class="field-group">
        <label class="field-label" for="lastName">Cognome</label>
        <input type="text" id="lastName" placeholder="Rossi" autocomplete="family-name">
      </div>
    </div>

    <div class="field-group">
      <label class="field-label" for="email">Email</label>
      <input type="email" id="email" placeholder="mario@esempio.it" autocomplete="email">
    </div>

    <div class="field-group">
      <label class="field-label" for="pw">Password</label>
      <div class="pw-wrap">
        <input type="password" id="pw" placeholder="Almeno 8 caratteri" autocomplete="new-password" oninput="checkStrength()">
        <button class="pw-toggle" type="button" onclick="togglePw('pw','tog1')" id="tog1">👁</button>
      </div>
      <div class="strength"><div class="strength-bar" id="strengthBar"></div></div>
    </div>

    <div class="field-group">
      <label class="field-label" for="pw2">Conferma password</label>
      <div class="pw-wrap">
        <input type="password" id="pw2" placeholder="Ripeti la password" autocomplete="new-password">
        <button class="pw-toggle" type="button" onclick="togglePw('pw2','tog2')" id="tog2">👁</button>
      </div>
    </div>

    <div class="field-group">
      <label class="field-label" for="inviteCode">Codice invito</label>
      <input type="text" id="inviteCode" placeholder="Inserisci il codice" autocomplete="off">
    </div>

    <button class="btn-register" id="btn" onclick="doRegister()">
      <span class="shimmer"></span>
      Crea account
    </button>

    <p class="terms">Registrandoti accetti i termini di servizio e la privacy policy.</p>
    <div class="divider"></div>
    <div class="footer-link">Hai già un account? <a href="/panel/login">Accedi ora</a></div>
  </div>
</div>

<script>
function togglePw(inputId,btnId){
  const input=document.getElementById(inputId);
  const btn=document.getElementById(btnId);
  if(input.type==='password'){input.type='text';btn.textContent='🙈';}
  else{input.type='password';btn.textContent='👁';}
}
function checkStrength(){
  const pw=document.getElementById('pw').value;
  const bar=document.getElementById('strengthBar');
  let score=0;
  if(pw.length>=8)score++;
  if(pw.length>=12)score++;
  if(/[A-Z]/.test(pw)&&/[a-z]/.test(pw))score++;
  if(/\d/.test(pw))score++;
  if(/[^A-Za-z0-9]/.test(pw))score++;
  const pct=[0,20,45,65,85,100][score];
  const colors=['','#f43f5e','#f97316','#fbbf24','#00d4ff','#10b981'];
  bar.style.width=pct+'%';
  bar.style.background=colors[score]||'';
}
function showError(msg){
  const el=document.getElementById('alertErr');
  document.getElementById('errMsg').textContent=msg;
  el.classList.remove('ok','shake');
  el.classList.add('show','err');
  void el.offsetWidth;
  el.classList.add('shake');
}
function hideError(){
  document.getElementById('alertErr').classList.remove('show','shake');
}
async function doRegister(){
  const firstName=document.getElementById('firstName').value.trim();
  const lastName=document.getElementById('lastName').value.trim();
  const email=document.getElementById('email').value.trim();
  const pw=document.getElementById('pw').value;
  const pw2=document.getElementById('pw2').value;
  const inviteCode=document.getElementById('inviteCode').value.trim();
  const btn=document.getElementById('btn');
  hideError();
  if(!firstName||!lastName||!email||!pw||!pw2){showError('Compila tutti i campi.');return;}
  if(pw.length<8){showError('La password deve avere almeno 8 caratteri.');return;}
  if(pw!==pw2){showError('Le password non coincidono.');return;}
  btn.disabled=true;
  btn.childNodes[btn.childNodes.length-1].textContent=' Creazione account…';
  try{
    const r=await fetch('/panel/api/auth/register',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({firstName,lastName,email,password:pw,inviteCode})
    });
    const data=await r.json();
    if(data.ok&&data.token){
      localStorage.setItem('panel_token',data.token);
      localStorage.setItem('panel_user',JSON.stringify(data.user));
      btn.childNodes[btn.childNodes.length-1].textContent=' ✓ Account creato!';
      location.href='/panel/';
    }else{
      showError(data.error||'Errore durante la registrazione.');
      btn.disabled=false;
      btn.childNodes[btn.childNodes.length-1].textContent=' Crea account';
    }
  }catch{
    showError('Errore di connessione. Riprova.');
    btn.disabled=false;
    btn.childNodes[btn.childNodes.length-1].textContent=' Crea account';
  }
}
document.addEventListener('keydown',e=>{if(e.key==='Enter')doRegister();});
if(localStorage.getItem('panel_token'))location.href='/panel/';
</script>
</body>
</html>
