<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PokéBot — Registrazione</title>
<style>
:root{
  --cyan:#00d4ff;
  --purple:#8b5cf6;
  --bg:#050b1a;
  --text:#eef2ff;
  --text-dim:rgba(238,242,255,0.45);
  --red:#ff4d6d;
  --green:#00e676;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  background:radial-gradient(ellipse 80% 55% at 0% 0%,rgba(109,40,217,.14) 0%,transparent 55%),radial-gradient(ellipse 60% 50% at 100% 100%,rgba(6,182,212,.1) 0%,transparent 55%),radial-gradient(ellipse 45% 40% at 100% 0%,rgba(236,72,153,.06) 0%,transparent 45%),radial-gradient(ellipse 40% 55% at 0% 100%,rgba(16,185,129,.06) 0%,transparent 45%),#050b1a;
  font-family:system-ui,-apple-system,sans-serif;
  color:var(--text);
  padding:1.5rem;
  overflow:hidden;
  position:relative;
}
body::before{
  content:'';position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(139,92,246,.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,212,255,.04) 1px,transparent 1px);
  background-size:52px 52px;
  animation:gridY 30s linear infinite;
  pointer-events:none;z-index:0;
}
body::after{
  content:'';position:fixed;
  width:700px;height:700px;
  top:50%;left:50%;transform:translate(-50%,-50%);
  background:radial-gradient(circle,rgba(109,40,217,0.09) 0%,rgba(0,212,255,0.04) 40%,transparent 70%);
  pointer-events:none;z-index:0;
}
@keyframes gridY{0%{background-position:0 0}100%{background-position:0 48px}}

.card{
  position:relative;z-index:1;
  width:100%;max-width:430px;
  background:rgba(8,15,38,0.9);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border:1px solid rgba(0,212,255,0.15);
  border-radius:22px;
  padding:2rem 2rem;
  box-shadow:0 0 0 1px rgba(0,0,0,0.5),0 30px 70px rgba(0,0,0,0.65),0 0 60px rgba(0,212,255,0.04),inset 0 1px 0 rgba(255,255,255,0.06);
}
.card::before{
  content:'';
  position:absolute;top:0;left:15%;right:15%;height:1px;
  background:linear-gradient(90deg,transparent,var(--purple),transparent);
  opacity:.65;border-radius:1px;
}
.card::after{
  content:'';position:absolute;
  top:-70px;right:-50px;
  width:200px;height:200px;
  background:radial-gradient(circle,rgba(139,92,246,0.1),transparent 70%);
  pointer-events:none;
}

.brand{text-align:center;margin-bottom:1.5rem}
.brand-icon{font-size:2.4rem;display:inline-block;margin-bottom:.5rem;filter:drop-shadow(0 0 14px rgba(139,92,246,0.7))}
.brand h1{
  font-size:1.35rem;font-weight:800;letter-spacing:-.01em;
  background:linear-gradient(135deg,#f0f4ff 20%,var(--purple) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:.25rem;
}
.brand p{font-size:.71rem;color:var(--text-dim);letter-spacing:.1em;text-transform:uppercase}

.row{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
.field-group{margin-bottom:.9rem}
.field-label{
  display:block;
  font-size:.7rem;font-weight:600;color:var(--text-dim);
  letter-spacing:.08em;text-transform:uppercase;margin-bottom:.45rem;
}
.field-group input{
  width:100%;
  padding:.78rem 1rem;
  background:rgba(4,8,20,0.7);
  border:1px solid rgba(255,255,255,0.09);
  border-radius:11px;
  color:var(--text);font-size:.9rem;
  transition:border-color .2s,box-shadow .2s;
}
.field-group input::placeholder{color:rgba(238,242,255,0.2)}
.field-group input:focus{
  outline:none;
  border-color:rgba(139,92,246,0.5);
  box-shadow:0 0 0 3px rgba(139,92,246,0.08);
}
.field-group input.err-input{border-color:rgba(255,77,109,.5)}
.pw-wrap{position:relative}
.pw-wrap input{padding-right:3rem}
.pw-toggle{
  position:absolute;right:.75rem;top:50%;transform:translateY(-50%);
  background:none;border:none;color:var(--text-dim);cursor:pointer;
  padding:.25rem;font-size:1rem;line-height:1;
  transition:color .15s;
}
.pw-toggle:hover{color:var(--text)}

.strength{height:3px;border-radius:2px;margin-top:.45rem;background:rgba(255,255,255,0.06);overflow:hidden}
.strength-bar{height:100%;border-radius:2px;width:0;transition:width .3s,background .3s}

.btn-register{
  width:100%;padding:.82rem;
  background:linear-gradient(135deg,#4c1d95,#6d28d9);
  color:#fff;border:none;border-radius:11px;
  font-size:.95rem;font-weight:700;letter-spacing:.04em;
  cursor:pointer;
  box-shadow:0 4px 24px rgba(109,40,217,0.4);
  transition:box-shadow .2s,transform .15s,opacity .15s;
  position:relative;overflow:hidden;
  margin-top:.25rem;
}
.btn-register::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.1),transparent 60%);
}
.btn-register:hover:not(:disabled){
  box-shadow:0 6px 32px rgba(109,40,217,0.65),0 0 20px rgba(139,92,246,0.2);
  transform:translateY(-1px);
}
.btn-register:disabled{opacity:.4;cursor:not-allowed;transform:none}

@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-4px)}40%,80%{transform:translateX(4px)}}
.alert{
  display:none;align-items:center;gap:.6rem;
  padding:.65rem .9rem;border-radius:10px;
  margin-bottom:.85rem;
  font-size:.82rem;font-weight:500;
}
.alert.err{background:rgba(255,55,95,.07);border:1px solid rgba(255,55,95,.3);color:#ff6b8a}
.alert.ok{background:rgba(0,230,118,.07);border:1px solid rgba(0,230,118,.3);color:var(--green)}
.alert.show{display:flex}
.alert.shake{animation:shake .35s ease}

.footer-link{
  text-align:center;margin-top:1.1rem;
  font-size:.78rem;color:var(--text-dim);
}
.footer-link a{color:var(--cyan);text-decoration:none;font-weight:600;transition:opacity .15s}
.footer-link a:hover{opacity:.8}

.terms{font-size:.7rem;color:var(--text-dim);text-align:center;margin-top:.8rem;line-height:1.5}
</style>
</head>
<body>
<div class="card">
  <div class="brand">
    <div class="brand-icon">✨</div>
    <h1>Crea account</h1>
    <p>PokéBot Panel v3.0</p>
  </div>

  <div class="alert err" id="alertErr">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
    <span id="errMsg"></span>
  </div>

  <div class="row">
    <div class="field-group">
      <label class="field-label" for="firstName">Nome</label>
      <input type="text" id="firstName" placeholder="Mario" autocomplete="given-name">
    </div>
    <div class="field-group">
      <label class="field-label" for="lastName">Cognome</label>
      <input type="text" id="lastName" placeholder="Rossi" autocomplete="family-name">
    </div>
  </div>

  <div class="field-group">
    <label class="field-label" for="email">Email</label>
    <input type="email" id="email" placeholder="mario@esempio.it" autocomplete="email">
  </div>

  <div class="field-group">
    <label class="field-label" for="pw">Password</label>
    <div class="pw-wrap">
      <input type="password" id="pw" placeholder="Almeno 8 caratteri" autocomplete="new-password" oninput="checkStrength()">
      <button class="pw-toggle" type="button" onclick="togglePw('pw','tog1')" id="tog1" title="Mostra/nascondi">👁</button>
    </div>
    <div class="strength"><div class="strength-bar" id="strengthBar"></div></div>
  </div>

  <div class="field-group">
    <label class="field-label" for="pw2">Conferma password</label>
    <div class="pw-wrap">
      <input type="password" id="pw2" placeholder="Ripeti la password" autocomplete="new-password">
      <button class="pw-toggle" type="button" onclick="togglePw('pw2','tog2')" id="tog2" title="Mostra/nascondi">👁</button>
    </div>
  </div>

  <button class="btn-register" id="btn" onclick="doRegister()">Crea account</button>

  <p class="terms">Registrandoti accetti i termini di servizio e la privacy policy.</p>

  <div class="footer-link">
    Hai già un account? <a href="/panel/login">Accedi</a>
  </div>
</div>
<script>
function togglePw(inputId,btnId){
  const input=document.getElementById(inputId);
  const btn=document.getElementById(btnId);
  if(input.type==='password'){input.type='text';btn.textContent='🙈';}
  else{input.type='password';btn.textContent='👁';}
}

function checkStrength(){
  const pw=document.getElementById('pw').value;
  const bar=document.getElementById('strengthBar');
  let score=0;
  if(pw.length>=8)score++;
  if(pw.length>=12)score++;
  if(/[A-Z]/.test(pw)&&/[a-z]/.test(pw))score++;
  if(/\d/.test(pw))score++;
  if(/[^A-Za-z0-9]/.test(pw))score++;
  const pct=[0,20,45,65,85,100][score];
  const colors=['','#ff4d6d','#ff9500','#fbbf24','#00d4ff','#00e676'];
  bar.style.width=pct+'%';
  bar.style.background=colors[score]||'';
}

function showError(msg){
  const el=document.getElementById('alertErr');
  document.getElementById('errMsg').textContent=msg;
  el.classList.remove('shake');
  el.classList.add('show');
  void el.offsetWidth;
  el.classList.add('shake');
}
function hideError(){
  document.getElementById('alertErr').classList.remove('show','shake');
}

async function doRegister(){
  const firstName=document.getElementById('firstName').value.trim();
  const lastName=document.getElementById('lastName').value.trim();
  const email=document.getElementById('email').value.trim();
  const pw=document.getElementById('pw').value;
  const pw2=document.getElementById('pw2').value;
  const btn=document.getElementById('btn');

  hideError();
  if(!firstName||!lastName||!email||!pw||!pw2){showError('Compila tutti i campi.');return;}
  if(pw.length<8){showError('La password deve avere almeno 8 caratteri.');return;}
  if(pw!==pw2){showError('Le password non coincidono.');return;}

  btn.disabled=true;
  btn.textContent='Creazione account…';
  try{
    const r=await fetch('/panel/api/auth/register',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({firstName,lastName,email,password:pw})
    });
    const data=await r.json();
    if(data.ok&&data.token){
      localStorage.setItem('panel_token',data.token);
      localStorage.setItem('panel_user',JSON.stringify(data.user));
      btn.textContent='✓ Account creato!';
      location.href='/panel/';
    }else{
      showError(data.error||'Errore durante la registrazione.');
      btn.disabled=false;
      btn.textContent='Crea account';
    }
  }catch{
    showError('Errore di connessione. Riprova.');
    btn.disabled=false;
    btn.textContent='Crea account';
  }
}
document.addEventListener('keydown',e=>{if(e.key==='Enter')doRegister();});
if(localStorage.getItem('panel_token'))location.href='/panel/';
</script>
</body>
</html>
