<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PokéBot — Accesso</title>
<style>
:root{
  --cyan:#00d4ff;
  --purple:#8b5cf6;
  --bg:#04080f;
  --text:#eef2ff;
  --text-dim:rgba(238,242,255,0.45);
  --red:#ff4d6d;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  background:var(--bg);
  font-family:system-ui,-apple-system,sans-serif;
  color:var(--text);
  padding:1.5rem;
  overflow:hidden;
  position:relative;
}
/* Grid */
body::before{
  content:'';position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(0,212,255,0.035) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,212,255,0.035) 1px,transparent 1px);
  background-size:48px 48px;
  animation:gridY 30s linear infinite;
  pointer-events:none;z-index:0;
}
/* Center glow */
body::after{
  content:'';position:fixed;
  width:700px;height:700px;
  top:50%;left:50%;transform:translate(-50%,-50%);
  background:radial-gradient(circle,rgba(109,40,217,0.09) 0%,rgba(0,212,255,0.04) 40%,transparent 70%);
  pointer-events:none;z-index:0;
}
@keyframes gridY{0%{background-position:0 0}100%{background-position:0 48px}}

/* Card */
.card{
  position:relative;z-index:1;
  width:100%;max-width:390px;
  background:rgba(8,15,38,0.9);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border:1px solid rgba(0,212,255,0.15);
  border-radius:22px;
  padding:2.25rem 2rem;
  box-shadow:
    0 0 0 1px rgba(0,0,0,0.5),
    0 30px 70px rgba(0,0,0,0.65),
    0 0 60px rgba(0,212,255,0.04),
    inset 0 1px 0 rgba(255,255,255,0.06);
}
/* Top highlight */
.card::before{
  content:'';
  position:absolute;top:0;left:15%;right:15%;height:1px;
  background:linear-gradient(90deg,transparent,var(--cyan),transparent);
  opacity:.65;border-radius:1px;
}
/* Corner orb */
.card::after{
  content:'';position:absolute;
  top:-70px;right:-50px;
  width:200px;height:200px;
  background:radial-gradient(circle,rgba(139,92,246,0.1),transparent 70%);
  pointer-events:none;
}

/* Brand */
.brand{text-align:center;margin-bottom:2rem}
.brand-icon{
  font-size:3rem;display:inline-block;margin-bottom:.75rem;
  filter:drop-shadow(0 0 18px rgba(139,92,246,0.7));
  animation:iconPulse 3s ease-in-out infinite;
}
@keyframes iconPulse{
  0%,100%{filter:drop-shadow(0 0 14px rgba(139,92,246,0.6))}
  50%{filter:drop-shadow(0 0 28px rgba(139,92,246,1))}
}
.brand h1{
  font-size:1.5rem;font-weight:800;letter-spacing:-.01em;
  background:linear-gradient(135deg,#f0f4ff 20%,var(--cyan) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:.3rem;
}
.brand p{font-size:.71rem;color:var(--text-dim);letter-spacing:.1em;text-transform:uppercase}

/* Form */
.field-label{
  display:flex;align-items:center;gap:.45rem;
  font-size:.7rem;font-weight:600;color:var(--text-dim);
  letter-spacing:.08em;text-transform:uppercase;margin-bottom:.5rem;
}
.pw-wrap{position:relative;margin-bottom:1.25rem}
.pw-wrap input{
  width:100%;
  padding:.8rem 3rem .8rem 1rem;
  background:rgba(4,8,20,0.7);
  border:1px solid rgba(255,255,255,0.09);
  border-radius:11px;
  color:var(--text);font-size:.95rem;letter-spacing:.02em;
  transition:border-color .2s,box-shadow .2s,background .2s;
}
.pw-wrap input::placeholder{color:rgba(238,242,255,0.2)}
.pw-wrap input:focus{
  outline:none;
  background:rgba(0,212,255,0.025);
  border-color:rgba(0,212,255,0.5);
  box-shadow:0 0 0 3px rgba(0,212,255,0.08),0 0 25px rgba(0,212,255,0.05);
}
.pw-toggle{
  position:absolute;right:.75rem;top:50%;transform:translateY(-50%);
  background:none;border:none;color:var(--text-dim);cursor:pointer;
  padding:.25rem;font-size:1rem;line-height:1;width:auto;
  transition:color .15s;
}
.pw-toggle:hover{color:var(--text)}

/* Button */
.btn-login{
  width:100%;padding:.82rem;
  background:linear-gradient(135deg,#5b21b6,#4f46e5);
  color:#fff;border:none;border-radius:11px;
  font-size:.95rem;font-weight:700;letter-spacing:.04em;
  cursor:pointer;
  box-shadow:0 4px 24px rgba(79,70,229,0.4);
  transition:box-shadow .2s,transform .15s,opacity .15s;
  position:relative;overflow:hidden;
}
.btn-login::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.1),transparent 60%);
}
.btn-login:hover:not(:disabled){
  box-shadow:0 6px 32px rgba(79,70,229,0.65),0 0 20px rgba(0,212,255,0.12);
  transform:translateY(-1px);
}
.btn-login:active:not(:disabled){transform:translateY(0)}
.btn-login:disabled{opacity:.4;cursor:not-allowed;transform:none}

/* Error */
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-4px)}40%,80%{transform:translateX(4px)}}
.error{
  display:none;align-items:center;gap:.6rem;
  background:rgba(255,55,95,.07);
  border:1px solid rgba(255,55,95,.3);
  color:#ff6b8a;
  padding:.65rem .9rem;border-radius:10px;
  margin-bottom:1.25rem;
  font-size:.82rem;font-weight:500;
}
.error.show{display:flex}
.error.shake{animation:shake .35s ease}
</style>
</head>
<body>
<div class="card">
  <div class="brand">
    <div class="brand-icon">🎮</div>
    <h1>PokéBot Panel</h1>
    <p>Sistema di controllo v2.0</p>
  </div>
  <div class="error" id="err">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
    <span id="errMsg"></span>
  </div>
  <div class="field-label">
    <svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
    Password di accesso
  </div>
  <div class="pw-wrap">
    <input type="password" id="pw" placeholder="••••••••••••" autofocus required>
    <button class="pw-toggle" type="button" id="pwToggle" onclick="togglePw()" title="Mostra/nascondi">👁</button>
  </div>
  <button class="btn-login" id="btn" onclick="doLogin()">Accedi al sistema</button>
</div>
<script>
function togglePw(){
  const input=document.getElementById('pw');
  const btn=document.getElementById('pwToggle');
  if(input.type==='password'){input.type='text';btn.textContent='🙈';}
  else{input.type='password';btn.textContent='👁';}
}
function showError(msg){
  const err=document.getElementById('err');
  document.getElementById('errMsg').textContent=msg;
  err.classList.remove('shake');
  err.classList.add('show');
  void err.offsetWidth;
  err.classList.add('shake');
}
async function doLogin(){
  const pw=document.getElementById('pw').value;
  const btn=document.getElementById('btn');
  if(!pw){document.getElementById('pw').focus();return;}
  btn.disabled=true;
  btn.textContent='Autenticazione…';
  document.getElementById('err').classList.remove('show','shake');
  try{
    const r=await fetch('/panel/login',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({password:pw})
    });
    const data=await r.json();
    if(data.ok&&data.token){
      localStorage.setItem('panel_token',data.token);
      btn.textContent='✓ Accesso autorizzato';
      location.href='/panel/';
    }else{
      showError(data.error||'Password non corretta.');
      btn.disabled=false;
      btn.textContent='Accedi al sistema';
    }
  }catch{
    showError('Errore di connessione. Riprova.');
    btn.disabled=false;
    btn.textContent='Accedi al sistema';
  }
}
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
if(localStorage.getItem('panel_token'))location.href='/panel/';
</script>
</body>
</html>
